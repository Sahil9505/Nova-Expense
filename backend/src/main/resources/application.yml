spring:
  application:
    name: nova-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      # Hard ceiling; the receipt service enforces the 10 MB product limit itself
      # so it can return a friendly error rather than a container rejection.
      max-file-size: 12MB
      max-request-size: 12MB

nova:
  cors:
    allowed-origins: ${NOVA_CORS_ALLOWED_ORIGINS:http://localhost:5173}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
  jwt:
    # Local/development default only. Always override JWT_SECRET in shared/production.
    secret: ${JWT_SECRET:nova-local-development-secret-do-not-use-in-production-0123456789}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:30}
  receipt:
    upload:
      max-file-size-mb: 10
      allowed-content-types: image/png,image/jpeg,image/jpg,image/webp
      allowed-extensions: png,jpg,jpeg,webp
    storage:
      backend: local
      local:
        path: ${NOVA_RECEIPT_DIR:./data/receipts}
    ocr:
      provider: tesseract
      path: ${TESSERACT_BIN:tesseract}
      languages: eng
      timeout-seconds: 20
  budget:
    # Budget health thresholds as fractions of the limit (not percentages).
    # Defaults apply when omitted; override per deployment to tune status boundaries.
    warning-threshold: ${NOVA_BUDGET_WARNING:0.80}   # WARNING once 80% is spent
    exceeded-threshold: ${NOVA_BUDGET_EXCEEDED:1.00} # EXCEEDED once 100% is spent
  ai:
    # Nova AI Copilot defaults. The model id, temperature, and token ceiling are
    # Nova's own. The provider key is read from nova.ai.api-key (populated from the
    # OPENROUTER_API_KEY env var) — NOT from spring.ai.openai.* — because this app
    # excludes the starter's OpenAI auto-configuration and builds the model manually
    # in OpenRouterConfig. The copilot starts even when the key is absent and answers
    # with a friendly "not configured" message rather than crashing the app.
    api-key: ${OPENROUTER_API_KEY:unconfigured-placeholder-key}
    # OpenRouter model slug. Override with OPENROUTER_MODEL.
    model: ${OPENROUTER_MODEL:deepseek/deepseek-chat-v3-0324:free}
    # OpenRouter base URL. OpenAI-compatible providers expose chat under
    # <baseUrl>/v1/chat/completions, so do NOT include the trailing /v1 here
    # (Spring AI appends it). Override with OPENROUTER_BASE_URL to point at any
    # OpenAI-compatible gateway (e.g. https://api.groq.com/openai).
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api}
    temperature: ${NOVA_AI_TEMPERATURE:0.2}
    max-tokens: ${NOVA_AI_MAX_TOKENS:1024}
    fallback-message: ${NOVA_AI_FALLBACK:The AI assistant is temporarily unavailable. Your financial data is safe — please try again shortly.}

info:
  app:
    name: Nova
    version: 0.1.0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: false

logging:
  level:
    root: INFO
    com.nova: DEBUG
