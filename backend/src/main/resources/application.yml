spring:
  application:
    name: nova-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

nova:
  cors:
    allowed-origins: ${NOVA_CORS_ALLOWED_ORIGINS:http://localhost:5173}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true

info:
  app:
    name: Nova
    version: 0.1.0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: false

logging:
  level:
    root: INFO
    com.nova: DEBUG
