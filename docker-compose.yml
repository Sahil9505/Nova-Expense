# OPTIONAL — Nova does NOT require Docker to run.
# The supported local quick start uses local Java + Node + a remote PostgreSQL
# (see docs/DEVELOPMENT.md). This compose file is provided only for convenience
# when deploying in containers.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nova
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: nova
    ports:
      - "5432:5432"
    volumes:
      - nova-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/nova
      DB_USERNAME: nova
      DB_PASSWORD: nova
      SPRING_PROFILES_ACTIVE: dev
      NOVA_CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  nova-pg:
